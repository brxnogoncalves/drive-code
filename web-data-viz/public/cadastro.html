<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive & Code - Login</title>
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <div class="header">
        <h1 class="logo-drive-code">Drive <span>&lt;Code/&gt;</span></h1>
        <ul class="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Do Motor ao Código</a></li>
            <li><a href="#">Dashboard</a></li>
            <li><a href="login.html" class="btn-login">Login</a></li>
            <li><a href="#" class="btn-cadastro link-ativo">Cadastro</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="login-container">
            <h1 class="logo-drive-code">Drive <span>&lt;Code/&gt;</span></h1>
            <form>
                <div class="campo">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite seu nome" required>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Digite seu email" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha" required>
                </div>

                <div class="campo">
                    <label>Data de nascimento</label>
                    <input type="date" required>
                </div>

                <div class="campo">
                    <label>Carro preferido</label>
                    <select id="select_carro_preferido">
                    </select>
                </div>

                <button type="submit" class="btn-submit">Cadastrar</button>

            </form>

            <p class="cadastro-link">
                Já tem conta? <a href="login.html">Entrar</a>
            </p>
        </div>
    </div>
</body>
<script>
    function listarCarros() {
        let carrosCadastrados;
        fetch("http://localhost:3333/carros/listar")
            .then(res => res.json())
            .then(dados => {
                console.log(dados);

                dados.forEach(carro => {
                    let optionSelect = `<option value="${carro.id_carro}">${carro.modelo} (${carro.marca})</option>`
                    let select = document.getElementById('select_carro_preferido');
                    select.innerHTML += optionSelect;
                })
            })
            .catch(erro => {
                console.error("Erro: ", erro);
            })
    }

    listarCarros();
</script>
</html>
