<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Drive & Code - Cadastro</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="login-page">
        <div class="cadastro-card">
            <div class="login-card-header">
                <div class="tag-login">
                    <a href="index.html"><span class="login-tag">Drive & Code</span></a>
                </div>
                <div>
                    <h2>Crie sua conta</h2>
                    <p>Cadastre-se para participar do quiz e acessar sua dashboard automotiva.</p>
                </div>
            </div>

            <div id="status_message" style="display: none;"></div>

            <div class="cadastro-form">

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite seu nome" id="ipt_nome">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite seu e-mail" id="ipt_email">
                </div>

                <div class="campo-duplo">
                    <div class="campo">
                        <label>Senha</label>
                        <input type="password" placeholder="Digite sua senha" id="ipt_senha">
                    </div>

                    <div class="campo">
                        <label>Confirmar senha</label>
                        <input type="password" placeholder="Confirme sua senha" id="ipt_confirm_senha">
                    </div>
                </div>

                <div class="campo-duplo">
                    <div class="campo">
                        <label>Data de nascimento</label>
                        <input type="date" id="ipt_data_nascimento">
                    </div>

                    <div class="campo">
                        <label>Nome do seu carro</label>
                        <input type="text" id="ipt_nome_carro" placeholder="Ex: Relâmpago Azul">
                    </div>
                </div>

                <button class="btn-cadastrar" onclick="cadastrar()">Cadastrar</button>

                <p class="cadastro-login">
                    Já tem uma conta?
                    <a href="login.html">Entrar</a>
                </p>

            </div>

        </div>
    </div>

</body>

    function cadastrar() {
        let nomeValue = ipt_nome.value;
        let emailValue = ipt_email.value;
        let senhaValue = ipt_senha.value;
        let confirmSenhaValue = ipt_confirm_senha.value;
        let dtNascimentoValue = ipt_data_nascimento.value;
        let nomeCarroValue = ipt_nome_carro.value;

        const status_msg_div = document.getElementById("status_message");

        if (nomeCarroValue.trim() == "" || nomeValue.trim() == "" || emailValue == "" || senhaValue == "" || confirmSenhaValue == "" || dtNascimentoValue == "" ) {
            status_msg_div.style.color = "red";
            status_msg_div.style.display = "block";
            status_msg_div.innerHTML = "Todos os campos devem ser preenchidos!";
            return;
        }


        if (senhaValue != confirmSenhaValue) {
            status_msg_div.style.color = "red";
            status_msg_div.style.display = "block";
            status_msg_div.innerHTML = "As senhas não coincidem!";
            return;
        }

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeServer: nomeValue,
                emailServer: emailValue,
                senhaServer: senhaValue,
                dtNascimentoServer: dtNascimentoValue,
                nomeCarroServer: nomeCarroValue
            })
        }).then(function (resposta) {
            console.log("Estou no then do cadastrar...");

            if (resposta.ok) {
                status_msg_div.style.color = "green";
                status_msg_div.style.display = "block";
                status_msg_div.innerHTML = "Cadastro realizado com sucesso!";
                setTimeout(function () {
                    window.location = "login.html";
                }, 1500);
            } else {
                throw "Houve um erro ao tentar realizar o cadastro!";
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }

</script>
