<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive & Code - Quiz</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <div class="header">
        <h1 class="logo-drive-code">Drive <span>&lt;Code/&gt;</span></h1>
        <ul class="navbar">
            <!-- LINKS SÃO COLOCADOS VIA JS -->
        </ul>
    </div>

    <div class="quiz-page">

        <div class="quiz-card">
            <span id="contador_pergunta" class="quiz-tag">Quiz Automotivo</span>

            <h2 id="pergunta">Carregando pergunta...</h2>

            <div class="quiz-info">
                <span id="tema_pergunta"></span>
                <span id="pontos_quiz">0 pontos</span>
            </div>

            <div class="opcoes" id="opcoes"></div>

            <div id="resultado_quiz" class="resultado-quiz none"></div>

            <button id="btn_proxima" class="btn-proxima none" onclick="proximaPergunta()">
                Próxima
            </button>
        </div>

    </div>
    <script src="../assets/js/utils.js"></script>
    <script>
        alterarNavBar() // utils

        let perguntas = [];
        let perguntaAtual = 0;
        let pontos = 0;
        let respondeu = false;

        // BUSCA PERGUNTAS NO BANCO
        fetch("/games/quiz/perguntas/1")
            .then(function (resposta) {
                if (resposta.ok) {
                    resposta.json().then(function (dados) {
                        console.log(dados);

                        perguntas = []; // limpa perguntas antigas

                        for (let i = 0; i < dados.length; i++) {
                            let p = dados[i];

                            let opcoes = [
                                { texto: p.alternativa_a, correta: p.alternativa_correta == "A" },
                                { texto: p.alternativa_b, correta: p.alternativa_correta == "B" },
                                { texto: p.alternativa_c, correta: p.alternativa_correta == "C" },
                                { texto: p.alternativa_d, correta: p.alternativa_correta == "D" }
                            ]

                            // embaralha opcoes
                            for (let i = opcoes.length - 1; i > 0; i--) {
                                let j = Math.floor(Math.random() * (i + 1));
                                let temp = opcoes[i];
                                opcoes[i] = opcoes[j];
                                opcoes[j] = temp;
                            }

                            let indiceCorreto = 0;
                            for (let i = 0; i < opcoes.length; i++) {
                                if (opcoes[i].correta) {
                                    indiceCorreto = i;
                                    break;
                                }
                            }

                            let perguntaObj = {
                                pergunta: p.pergunta,
                                opcoes: [
                                    opcoes[0].texto,
                                    opcoes[1].texto,
                                    opcoes[2].texto,
                                    opcoes[3].texto
                                ],
                                correta: indiceCorreto,
                                tema: p.tema
                            };

                            perguntas.push(perguntaObj);
                        }

                        carregarPergunta();
                    });
                }
            })

        function carregarPergunta() {
            respondeu = false;

            let perguntaObj = perguntas[perguntaAtual];

            pergunta.innerHTML = perguntaObj.pergunta;
            contador_pergunta.innerHTML = "Pergunta " + (perguntaAtual + 1) + " de " + perguntas.length;
            tema_pergunta.innerHTML = "Tema: " + perguntaObj.tema;
            pontos_quiz.innerHTML = "Pontos ganhos: " + pontos + " pontos";

            resultado_quiz.classList.add("none");
            btn_proxima.classList.add("none");

            opcoes.innerHTML = ""; // limpa opcoes da pergunta anterior

            for (let i = 0; i < perguntaObj.opcoes.length; i++) { // percorre todas as opções para renderizar uma a uma no html
                opcoes.innerHTML += `
                    <button class="opcao-btn" onclick="responder(${i})">
                        ${perguntaObj.opcoes[i]}
                    </button>
                `;
            }
        }

        function responder(indice) {
            if (respondeu) return;

            respondeu = true;

            let perguntaObj = perguntas[perguntaAtual];
            let botoesOpcoes = document.querySelectorAll(".opcao-btn");

            if (indice == perguntaObj.correta) {
                pontos += 10;
                botoesOpcoes[indice].classList.add("opcao-correta");

                resultado_quiz.innerHTML = "Resposta correta!";
                resultado_quiz.className = "resultado-quiz resultado-correto";
            } else {
                botoesOpcoes[indice].classList.add("opcao-errada");
                botoesOpcoes[perguntaObj.correta].classList.add("opcao-correta");

                resultado_quiz.innerHTML = "Resposta errada!";
                resultado_quiz.className = "resultado-quiz resultado-errado";
            }

            pontos_quiz.innerHTML = pontos + " pontos";
            btn_proxima.classList.remove("none");
        }

        function proximaPergunta() {
            perguntaAtual++;

            if (perguntaAtual < perguntas.length) {
                carregarPergunta();
            } else {
                finalizarQuiz();
            }
        }

        function finalizarQuiz() {
            let xpGanho = pontos;

            pergunta.innerHTML = "Quiz finalizado!";
            contador_pergunta.innerHTML = "Resultado final";
            pontos_quiz.innerHTML = pontos + " pontos";

            opcoes.innerHTML = `
            <div class="quiz-final">
                <h3>Você ganhou ${xpGanho} XP!</h3>
                <p>Seu carro será atualizado com essa pontuação.</p>
                <a href="../games.html" class="btn-jogar">Voltar</a>
            </div>
            `;

            resultado_quiz.classList.add("none");
            btn_proxima.classList.add("none");

            adicionarXP(xpGanho);
        }

        function adicionarXP(xpGanho) {
            fetch("/games/adicionarXP", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    idUsuarioServer: sessionStorage.ID_USUARIO,
                    idGameServer: 1,
                    xpGanhoServer: xpGanho
                })
            })
                .then(function (resposta) {
                    if (resposta.ok) {
                        resposta.json().then(function (json) {
                            sessionStorage.XP_CARRO = json.xp;
                            sessionStorage.NIVEL_CARRO = json.nivel;

                            console.log("XP atualizado:", json);
                        });
                    }
                })
        }
    </script>

</body>

</html>
