<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive & Code - Login</title>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
  <div class="header">
    <h1 class="logo-drive-code">Drive <span>&lt;Code/&gt;</span></h1>
    <ul class="navbar">
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Do Motor ao Código</a></li>

      <li><a href="#" class="btn-login link-ativo">Login</a></li>
      <li><a href="cadastro.html" class="btn-cadastro">Cadastro</a></li>

  </div>

  <div class="container">
    <div class="login-container">
      <h1 class="logo-drive-code">Drive <span>&lt;Code/&gt;</span></h1>
      <form>
        <div class="campo">
          <label>Email</label>
          <input type="email" placeholder="Digite seu email" required>
        </div>

        <div class="campo">
          <label>Senha</label>
          <input type="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
      </form>

      <p class="cadastro-link">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </p>
    </div>

  </div>
